<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sierra People — Datos Separados</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0f14;--surface:#161922;--surface2:#1e2230;
    --border:rgba(255,255,255,0.07);
    --accent:#6c63ff;--accent2:#00d4aa;--text:#e8eaf2;--muted:#7c82a0;
    --font:'DM Sans',sans-serif;--radius:14px;
  }
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;overflow-x:hidden}
  .shell{display:flex;min-height:100vh}
  .sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;position:sticky;top:0;height:100vh}
  .logo{padding:0 20px 28px; font-weight:600; font-size:16px; border-bottom:1px solid var(--border); margin-bottom:16px; color: var(--accent)}
  .nav-item{padding:12px 20px; color:var(--muted); cursor:pointer; font-size:13px; transition:0.2s; display: flex; align-items: center; gap: 10px;}
  .nav-item:hover, .nav-item.active{color:var(--text); background:rgba(108,99,255,0.15)}
  .nav-item.active{border-right: 3px solid var(--accent); color: var(--accent)}
  .main{flex:1; padding:32px; overflow-y: auto;}
  .topbar{margin-bottom:24px; display:flex; justify-content:space-between; align-items:center}
  .status-pill{background: var(--surface2); padding: 4px 12px; border-radius: 20px; font-size: 11px; border: 1px solid var(--border)}
  
  .table-card{background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; margin-bottom:28px}
  table{width:100%; border-collapse:collapse}
  th{background:var(--surface2); padding:14px 18px; text-align:left; font-size:11px; text-transform:uppercase; color:var(--muted); cursor:pointer}
  td{padding:14px 18px; border-bottom:1px solid var(--border)}
  
  .row-master{background:rgba(108,99,255,0.03); cursor:pointer; font-weight:600}
  .row-detail{display:none; background:rgba(255,255,255,0.01)}
  .row-detail td:first-child{padding-left:45px; color:var(--muted); position: relative}
  .row-detail td:first-child::before{content:'└'; position:absolute; left:25px; color:var(--border)}
  
  .filter-bar{padding:15px; display:flex; gap:12px; background:var(--surface2); border-bottom:1px solid var(--border); align-items: center}
  input, select{background:var(--bg); border:1px solid var(--border); color:white; padding:8px 12px; border-radius:8px; font-size:12px; outline:none}
  .toggle-icon{display:inline-block; width:15px; transition:0.2s; font-size: 10px}
  .expanded .toggle-icon{transform:rotate(90deg)}
  
  .badge-count{background: var(--accent); color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; margin-left: auto}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="logo">Sierra People Intelligence</div>
    <div class="nav-item active" onclick="showPage('personal', this)">👥 Estructura de Personal</div>
    <div class="nav-item" onclick="showPage('pagos', this)">💰 Captura de Pagos Real</div>
  </aside>
  
  <main class="main">
    <div class="topbar">
      <h2 id="view-title">Estructura de Personal</h2>
      <div class="status-pill" id="data-status">Esperando datos...</div>
    </div>

    <div id="page-personal" class="content-page">
      <div class="table-card">
        <div class="filter-bar">
          <input type="text" placeholder="Buscar en catálogo..." oninput="renderPersonal(this.value)" style="width: 300px">
        </div>
        <table>
          <thead>
            <tr>
              <th>UDN / Puesto</th>
              <th>Colaboradores Activos</th>
              <th>Promedio Antigüedad</th>
            </tr>
          </thead>
          <tbody id="personalBody"></tbody>
        </table>
      </div>
    </div>

    <div id="page-pagos" class="content-page" style="display:none">
      <div class="table-card">
        <div class="filter-bar">
          <label style="font-size:12px">Filtrar por concepto capturado:</label>
          <select id="conceptoFilter" onchange="renderPagos()"><option value="">Todos los conceptos</option></select>
        </div>
        <table>
          <thead>
            <tr>
              <th>UDN / Puesto (Datos de Captura)</th>
              <th>Registros</th>
              <th>Monto Promedio</th>
              <th>Total Acumulado</th>
            </tr>
          </thead>
          <tbody id="pagosBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
let dataEmpl = [], dataNomina = [];

const URL_NOMINA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTsCSsKx9zvxGiXbhNSqbc8NTMUymv_w6osRHGydgRt8WIUjqC-O6QDupUFJtOdxcIIys3bNeUayOSr/pub?gid=1339015466&single=true&output=csv";
const URL_EMPLEADOS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQfIxhbAy90BMi2mGCl_hrG8wYlUmhtdQK6umd0luAXsVuny-twtYfzLYnW_Bbg93jUjyv7k5l78Epa/pub?gid=292929104&single=true&output=csv";

function showPage(p, el) {
  document.querySelectorAll('.content-page').forEach(pg => pg.style.display = 'none');
  document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active'));
  document.getElementById('page-' + p).style.display = 'block';
  document.getElementById('view-title').textContent = el.textContent;
  el.classList.add('active');
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
  return lines.slice(1).map(line => {
    const vals = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || "").replace(/"/g, '').trim());
    return obj;
  });
}

async function loadData() {
  try {
    const [resE, resN] = await Promise.all([fetch(URL_EMPLEADOS), fetch(URL_NOMINA)]);
    dataEmpl = parseCSV(await resE.text());
    dataNomina = parseCSV(await resN.text());

    // Poblar filtro de conceptos de la tabla de pagos
    const conceptos = [...new Set(dataNomina.map(n => n['Concepto']))].filter(Boolean).sort();
    document.getElementById('conceptoFilter').innerHTML = '<option value="">Todos los conceptos</option>' + conceptos.map(c => `<option value="${c}">${c}</option>`).join('');

    renderPersonal();
    renderPagos();
    document.getElementById('data-status').textContent = "Bases cargadas de forma independiente";
  } catch(e) {
    document.getElementById('data-status').textContent = "Error de conexión";
  }
}

// RENDER TABLA 1: ESTRUCTURA (Basado solo en archivo Empleados)
function renderPersonal(search = "") {
  const query = search.toLowerCase();
  const tree = {};

  dataEmpl.forEach(e => {
    if ((e['Estatus empleado'] || 'A') !== 'A') return;
    const udn = e['Departamento'] || 'Sin UDN';
    const puesto = e['Puesto'] || 'Sin Puesto';
    const nombre = (e['Nombre'] || '') + ' ' + (e['Apellido paterno'] || '');
    
    if (query && !udn.toLowerCase().includes(query) && !puesto.toLowerCase().includes(query) && !nombre.toLowerCase().includes(query)) return;

    if (!tree[udn]) tree[udn] = { n: 0, puestos: {} };
    tree[udn].n++;
    if (!tree[udn].puestos[puesto]) tree[udn].puestos[puesto] = 0;
    tree[udn].puestos[puesto]++;
  });

  let html = '';
  Object.keys(tree).sort().forEach((uName, i) => {
    const u = tree[uName];
    const id = `empl-${i}`;
    html += `<tr class="row-master" onclick="toggle('${id}', this)">
      <td><span class="toggle-icon">▶</span> 🏢 ${uName}</td>
      <td>${u.n} personas</td>
      <td>—</td>
    </tr>`;
    Object.keys(u.puestos).sort().forEach(pName => {
      html += `<tr class="row-detail ${id}">
        <td>${pName}</td>
        <td>${u.puestos[pName]} colaboradores</td>
        <td>—</td>
      </tr>`;
    });
  });
  document.getElementById('personalBody').innerHTML = html;
}

// RENDER TABLA 2: PAGOS (Basado solo en archivo Nómina)
function renderPagos() {
  const fConcepto = document.getElementById('conceptoFilter').value;
  const tree = {};

  dataNomina.forEach(n => {
    if (fConcepto && n['Concepto'] !== fConcepto) return;
    
    // Usamos los campos que vengan en el archivo de nómina
    const udn = n['Departamento'] || n['CDN'] || 'Sin UDN';
    const puesto = n['Puesto'] || 'Sin Puesto';
    const monto = parseFloat((n['Total'] || "0").replace(/[^0-9.-]+/g,"")) || 0;

    if (!tree[udn]) tree[udn] = { n:0, total: 0, puestos: {} };
    tree[udn].n++;
    tree[udn].total += monto;

    if (!tree[udn].puestos[puesto]) tree[udn].puestos[puesto] = { n:0, total:0 };
    tree[udn].puestos[puesto].n++;
    tree[udn].puestos[puesto].total += monto;
  });

  let html = '';
  Object.keys(tree).sort().forEach((uName, i) => {
    const u = tree[uName];
    const id = `pago-${i}`;
    html += `<tr class="row-master" onclick="toggle('${id}', this)">
      <td><span class="toggle-icon">▶</span> 📁 ${uName}</td>
      <td>${u.n} registros</td>
      <td>$${Math.round(u.total/u.n).toLocaleString()}</td>
      <td style="color:var(--accent2)">$${Math.round(u.total).toLocaleString()}</td>
    </tr>`;
    Object.keys(u.puestos).sort().forEach(pName => {
      const p = u.puestos[pName];
      html += `<tr class="row-detail ${id}">
        <td>${pName}</td>
        <td>${p.n} recubos</td>
        <td>$${Math.round(p.total/p.n).toLocaleString()}</td>
        <td>$${Math.round(p.total).toLocaleString()}</td>
      </tr>`;
    });
  });
  document.getElementById('pagosBody').innerHTML = html;
}

function toggle(id, el) {
  el.classList.toggle('expanded');
  document.querySelectorAll('.'+id).forEach(r => r.style.display = (r.style.display === 'table-row' ? 'none' : 'table-row'));
}

window.onload = loadData;
</script>
</body>
</html>
