<div class="table-card">
  <div class="table-header">
    <div class="table-title">Directorio de empleados activos</div>
    <div class="table-controls">
      <input class="search-input" type="text" placeholder="Nombre, puesto, CDN, código…" id="searchInput" oninput="filterTable()">
      <select class="filter-select" id="areaFilter" onchange="filterTable()">
        <option value="">Todas las áreas</option>
      </select>
      <span class="count-badge" id="countBadge">—</span>
    </div>
  </div>
  <div style="overflow-x:auto">
    <table>
      <thead>
        <tr>
          <th onclick="sortTable('nombre')" style="cursor:pointer">Empleado ↕</th>
          <th onclick="sortTable('area')" style="cursor:pointer">Área ↕</th>
          <th onclick="sortTable('puesto')" style="cursor:pointer">Puesto ↕</th>
          <th onclick="sortTable('cdn')" style="cursor:pointer">CDN / Centro ↕</th>
          <th onclick="sortTable('estado')" style="cursor:pointer">Estado ↕</th>
          <th>Fecha alta</th>
          <th onclick="sortTable('antiguedad')" style="cursor:pointer">Antigüedad ↕</th>
          <th onclick="sortTable('sal_mensual')" style="cursor:pointer">Sal. mensual ↕</th>
        </tr>
      </thead>
      <tbody id="empTable"></tbody>
    </table>
  </div>
  </div>

<script>
/* --- Añade estas variables y función al final de tu <script> --- */

let currentSort = { key: '', dir: 'asc' };

function sortTable(key) {
  // Si volvemos a hacer clic en la misma columna, invertimos la dirección
  if (currentSort.key === key) {
    currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    currentSort.key = key;
    currentSort.dir = 'asc';
  }

  filtered.sort((a, b) => {
    let valA = a[key];
    let valB = b[key];

    // Manejo especial para números (antigüedad y salario)
    if (key === 'antiguedad' || key === 'sal_mensual') {
      valA = parseFloat(valA) || 0;
      valB = parseFloat(valB) || 0;
    } else {
      // Para texto, ignorar mayúsculas/minúsculas
      valA = valA.toString().toLowerCase();
      valB = valB.toString().toLowerCase();
    }

    if (valA < valB) return currentSort.dir === 'asc' ? -1 : 1;
    if (valA > valB) return currentSort.dir === 'asc' ? 1 : -1;
    return 0;
  });

  currentPage = 0; // Reiniciar a la primera página tras ordenar
  renderTable(filtered, 0);
  
  // Opcional: Mostrar feedback visual en consola o podrías añadir clases CSS al TH
  console.log(`Ordenado por ${key} en dirección ${currentSort.dir}`);
}

/* Asegúrate de que la función renderTable y filterTable sigan existiendo. 
  La lógica de filtrado ahora trabajará sobre la lista ordenada.
*/
</script>
